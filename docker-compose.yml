version: '3.8'

services:
  mysql-clinical:
    image: mysql:8.0
    container_name: mysql-clinical
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinical_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-clinical-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: redis-clinical
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq-clinical
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  wordpress:
    image: wordpress:latest
    container_name: wordpress-clinical
    environment:
      WORDPRESS_DB_HOST: mysql-clinical:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: root
      WORDPRESS_DB_NAME: wordpress_db
    ports:
      - "8080:80"
    depends_on:
      - mysql-clinical
    volumes:
      - wordpress-data:/var/www/html

volumes:
  mysql-clinical-data:
  rabbitmq-data:
  wordpress-data: