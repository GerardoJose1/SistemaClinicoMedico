version: '3.8'

services:
  mysql-clinical:
    image: mysql:8.0
    container_name: mysql-clinical
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinical_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-clinical-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: redis-clinical
    ports:
      - "6379:6379"

volumes:
  mysql-clinical-data: